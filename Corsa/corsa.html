<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        function vai(){
            var anni= document.getElementById("anni").value;
            var altezza=document.getElementById("altezza").value;
            var peso= document.getElementById("peso").value;
            var risulato=0;
            var pesoIdeale=0;
            pesoIdeale=(altezza-100)-((altezza-150)/2);
            var delta = Math.abs(peso-pesoIdeale);
            var km=delta*(20/peso);
            risultato=km/30;
            document.getElementById("km").innerHTML=(risultato.toFixed(2))+" km al giorno per 30 giorni.";

        }
    </script>

        }

        .result{

        }

            float:right;
            margin:2%;
        }

        .form{
            place-items: center;
            
        }

        .image{
            
        }

        #km{
            background-color: #6464bb;
            max-width:10%;
            text-align: center;
            height:100%;
            margin:2%;
        }

        @media(max-width:767px) {

            width:150px;

    </style>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body bgcolor="#FFFAE0">
    <center>
        <h1>Formula di <span id="arcelli">Arcelli</span></h1>
    
    <br>
    <br>

       <tr>
           <td class="image">

       </tr>
        <tr>

            </td>

    <section class="data">

                    <h2 style="font-size:1em">Inserisci le informazioni</h2>

</div>
